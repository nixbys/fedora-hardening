name: ShellCheck

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning
          check_together: "yes"
        env:
          SHELLCHECK_OPTS: >-
            --shell=bash
            --exclude=SC2034,SC1090,SC1091
