name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: "fedora-harden.sh"
          severity: error
          check_together: "yes"
        env:
          SHELLCHECK_OPTS: >-
            --source-path=SCRIPTDIR
            --enable=all
            --exclude=SC2154,SC2250,SC2310,SC2249,SC2312

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt
        run: |
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.6.0/shfmt_v3.6.0_linux_amd64 \
            -o /usr/local/bin/shfmt && chmod +x /usr/local/bin/shfmt

      - name: Check formatting with shfmt
        run: shfmt -d fedora-harden.sh

